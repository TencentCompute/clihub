name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: xvfb-run -a npm test

      - name: Package public VSIX
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          bash ./release.sh "$VERSION" --force --channel public

      - name: Create GitHub Release and upload VSIX
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          gh release create "$TAG_NAME" cli-hub-*-public.vsix --generate-notes --latest

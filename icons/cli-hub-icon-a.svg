<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- 背景渐变 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F1729"/>
      <stop offset="100%" style="stop-color:#0B1220"/>
    </linearGradient>
    <!-- 主色渐变 -->
    <linearGradient id="promptGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38BDF8"/>
      <stop offset="100%" style="stop-color:#22D3EE"/>
    </linearGradient>
    <!-- 发光效果 -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- 星芒发光 -->
    <filter id="starGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 深色圆角方形背景 -->
  <rect x="64" y="64" width="896" height="896" rx="160" ry="160" fill="url(#bgGradient)"/>
  
  <!-- 细微边框增强层次 -->
  <rect x="64" y="64" width="896" height="896" rx="160" ry="160" 
        fill="none" stroke="#1E3A5F" stroke-width="2" opacity="0.5"/>
  
  <!-- 终端符号 ">_" -->
  <g filter="url(#glow)">
    <!-- ">" 符号 -->
    <path d="M280 380 L450 512 L280 644" 
          fill="none" stroke="url(#promptGradient)" stroke-width="56" 
          stroke-linecap="round" stroke-linejoin="round"/>
    <!-- "_" 下划线/光标 -->
    <rect x="500" y="588" width="200" height="56" rx="8" fill="url(#promptGradient)">
      <animate attributeName="opacity" values="1;0.4;1" dur="1.2s" repeatCount="indefinite"/>
    </rect>
  </g>
  
  <!-- 右上角 AI 星芒点缀 -->
  <g transform="translate(760, 200)" filter="url(#starGlow)">
    <!-- 四角星芒 -->
    <path d="M0 -40 L8 -8 L40 0 L8 8 L0 40 L-8 8 L-40 0 L-8 -8 Z" 
          fill="#38BDF8" opacity="0.9"/>
    <!-- 小光点 -->
    <circle cx="30" cy="-25" r="6" fill="#22D3EE" opacity="0.7"/>
    <circle cx="-20" cy="30" r="4" fill="#38BDF8" opacity="0.5"/>
  </g>
</svg>
